<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Makeup Studio 💄</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffe0f0 0%, #ffd0e8 50%, #ffb3d9 100%);
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 10px 30px;
    }

    header { text-align: center; padding: 10px 0 8px; width: 100%; }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.6rem, 6vw, 2.6rem);
      color: #c0306a;
      text-shadow: 2px 2px 0 rgba(255,255,255,0.6);
    }

    #back {
      position: fixed; top: 12px; left: 14px;
      text-decoration: none; color: #c0306a;
      font-size: 1.4rem; font-weight: 700; z-index: 20;
      background: rgba(255,255,255,0.6); border-radius: 50px;
      padding: 4px 12px;
    }

    .studio {
      display: flex;
      gap: 16px;
      width: 100%;
      max-width: 820px;
      align-items: flex-start;
      justify-content: center;
      flex-wrap: wrap;
    }

    #char-wrap {
      background: white;
      border-radius: 24px;
      box-shadow: 0 6px 20px rgba(200,0,100,0.15);
      padding: 20px;
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #char-svg { width: 240px; height: 300px; overflow: visible; }

    .panel {
      background: white;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 6px 20px rgba(200,0,100,0.12);
      flex: 1 1 200px;
      min-width: 180px;
      max-width: 280px;
    }

    .panel h3 {
      font-family: 'Fredoka One', cursive;
      color: #c0306a;
      font-size: 1.05rem;
      margin-bottom: 10px;
      text-align: center;
    }

    .section { margin-bottom: 16px; }

    .colour-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 6px;
    }

    .swatch {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.18);
      flex-shrink: 0;
    }

    .swatch:hover  { transform: scale(1.2); }
    .swatch.active { border-color: #440044; transform: scale(1.1); }

    .none-swatch {
      background: white;
      border: 3px dashed #ddd;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; color: #aaa; font-weight: 700;
    }

    .toggle-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .toggle-btn {
      border: 2px solid #f0b0c8;
      border-radius: 10px;
      background: #fff5f8;
      padding: 6px 12px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      color: #c0306a;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .toggle-btn:hover  { background: #ffe0ee; border-color: #e06090; }
    .toggle-btn.active { background: linear-gradient(135deg,#ffd0e8,#ffaad0); border-color: #c0306a; }

    .reset-btn {
      margin-top: 14px;
      width: 100%;
      padding: 10px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #ff80b0, #cc0055);
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 3px 0 #880033;
    }

    .reset-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #880033; }
  </style>
</head>
<body>

<a href="index.html" id="back">← Back</a>
<header><h1>💄 Makeup Studio 💄</h1></header>

<div class="studio">

  <!-- Character -->
  <div id="char-wrap">
    <svg id="char-svg" viewBox="0 0 240 300" xmlns="http://www.w3.org/2000/svg">

      <!-- NECK -->
      <rect x="103" y="242" width="34" height="38" rx="10" fill="#FDDBB4"/>
      <!-- SHOULDERS -->
      <ellipse cx="120" cy="300" rx="90" ry="38" fill="#ff99cc"/>

      <!-- FACE -->
      <ellipse cx="120" cy="168" rx="82" ry="90" fill="#FDDBB4"/>
      <!-- EARS -->
      <ellipse cx="40"  cy="168" rx="18" ry="22" fill="#FDDBB4"/>
      <ellipse cx="200" cy="168" rx="18" ry="22" fill="#FDDBB4"/>
      <ellipse cx="40"  cy="168" rx="10" ry="13" fill="#f5c49e"/>
      <ellipse cx="200" cy="168" rx="10" ry="13" fill="#f5c49e"/>

      <!-- HAIR (simple short style) -->
      <ellipse cx="120" cy="105" rx="88" ry="72" fill="#4a2800"/>
      <path d="M38 145 Q36 78 120 60 Q204 78 202 145 Q180 98 120 96 Q60 98 38 145Z" fill="#5c3400"/>
      <path d="M38 145 Q20 172 30 198 Q50 192 58 172 Q50 152 38 145Z" fill="#5c3400"/>
      <path d="M202 145 Q220 172 210 198 Q190 192 182 172 Q190 152 202 145Z" fill="#5c3400"/>

      <!-- EYE WHITES -->
      <ellipse cx="90"  cy="153" rx="20" ry="18" fill="white"/>
      <ellipse cx="150" cy="153" rx="20" ry="18" fill="white"/>

      <!-- EYESHADOW -->
      <ellipse id="es-l" cx="90"  cy="150" rx="21" ry="15" fill="transparent" opacity="0.55"/>
      <ellipse id="es-r" cx="150" cy="150" rx="21" ry="15" fill="transparent" opacity="0.55"/>

      <!-- IRISES -->
      <circle cx="90"  cy="155" r="12" fill="#5B3A29"/>
      <circle cx="150" cy="155" r="12" fill="#5B3A29"/>
      <circle cx="90"  cy="155" r="7"  fill="#1a0a00"/>
      <circle cx="150" cy="155" r="7"  fill="#1a0a00"/>
      <circle cx="94"  cy="150" r="3.5" fill="white"/>
      <circle cx="154" cy="150" r="3.5" fill="white"/>

      <!-- EYELINER -->
      <path id="liner-l" d="M70 148 Q90 138 110 148" stroke="transparent" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path id="liner-r" d="M130 148 Q150 138 170 148" stroke="transparent" stroke-width="3" fill="none" stroke-linecap="round"/>

      <!-- LASHES -->
      <path d="M72 141 Q80 133 90 138" stroke="#1a0a00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M108 141 Q100 133 90 138" stroke="#1a0a00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M132 141 Q140 133 150 138" stroke="#1a0a00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M168 141 Q160 133 150 138" stroke="#1a0a00" stroke-width="2.5" fill="none" stroke-linecap="round"/>

      <!-- GLAM LASHES (thicker, shown when mascara on) -->
      <g id="mascara-lashes" opacity="0">
        <path d="M68 140 Q75 128 90 135" stroke="#000" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M80 136 Q82 122 90 130" stroke="#000" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M100 136 Q102 122 95 128" stroke="#000" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M110 140 Q105 128 95 132" stroke="#000" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M128 140 Q135 128 150 135" stroke="#000" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M140 136 Q142 122 150 130" stroke="#000" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M160 136 Q162 122 155 128" stroke="#000" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M170 140 Q165 128 155 132" stroke="#000" stroke-width="4" fill="none" stroke-linecap="round"/>
      </g>

      <!-- EYEBROWS -->
      <path id="brow-l" d="M72 131 Q90 121 108 131" stroke="#5B3A29" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path id="brow-r" d="M132 131 Q150 121 168 131" stroke="#5B3A29" stroke-width="3.5" fill="none" stroke-linecap="round"/>

      <!-- NOSE -->
      <ellipse cx="120" cy="188" rx="9" ry="7" fill="#f5c49e"/>
      <circle cx="114" cy="191" r="4" fill="#edb88a"/>
      <circle cx="126" cy="191" r="4" fill="#edb88a"/>

      <!-- BLUSH -->
      <ellipse id="blush-l" cx="68"  cy="185" rx="18" ry="12" fill="#ffb3c6" opacity="0"/>
      <ellipse id="blush-r" cx="172" cy="185" rx="18" ry="12" fill="#ffb3c6" opacity="0"/>

      <!-- HIGHLIGHTER -->
      <ellipse id="hi-l" cx="74"  cy="174" rx="10" ry="6" fill="#fffde0" opacity="0"/>
      <ellipse id="hi-r" cx="166" cy="174" rx="10" ry="6" fill="#fffde0" opacity="0"/>

      <!-- LIPS -->
      <path id="lip-upper" d="M96 212 Q108 207 120 210 Q132 207 144 212 Q136 205 120 203 Q104 205 96 212Z" fill="#e8667a"/>
      <path id="lip-lower" d="M96 212 Q120 230 144 212 Q130 228 120 230 Q110 228 96 212Z" fill="#e86080"/>
      <path d="M96 212 Q120 220 144 212" stroke="#c04060" stroke-width="1.2" fill="none"/>

      <!-- GLITTER overlay -->
      <g id="glitter-group" opacity="0"></g>
    </svg>
  </div>

  <!-- Makeup panels -->
  <div style="display:flex;flex-direction:column;gap:14px;flex:1 1 200px;min-width:180px;max-width:280px">

    <div class="panel">
      <div class="section">
        <h3>👁️ Eyeshadow</h3>
        <div class="colour-row" id="es-swatches">
          <div class="swatch none-swatch" onclick="setMakeup('eyeshadow','none',this)">✕</div>
          <div class="swatch" style="background:#c084fc" onclick="setMakeup('eyeshadow','#c084fc',this)"></div>
          <div class="swatch" style="background:#818cf8" onclick="setMakeup('eyeshadow','#818cf8',this)"></div>
          <div class="swatch" style="background:#38bdf8" onclick="setMakeup('eyeshadow','#38bdf8',this)"></div>
          <div class="swatch" style="background:#34d399" onclick="setMakeup('eyeshadow','#34d399',this)"></div>
          <div class="swatch" style="background:#fb923c" onclick="setMakeup('eyeshadow','#fb923c',this)"></div>
          <div class="swatch" style="background:#f472b6" onclick="setMakeup('eyeshadow','#f472b6',this)"></div>
          <div class="swatch" style="background:#fbbf24" onclick="setMakeup('eyeshadow','#fbbf24',this)"></div>
          <div class="swatch" style="background:#6b7280" onclick="setMakeup('eyeshadow','#6b7280',this)"></div>
        </div>
      </div>

      <div class="section">
        <h3>✏️ Eyeliner</h3>
        <div class="colour-row" id="liner-swatches">
          <div class="swatch none-swatch" onclick="setMakeup('liner','none',this)">✕</div>
          <div class="swatch" style="background:#111" onclick="setMakeup('liner','#111',this)"></div>
          <div class="swatch" style="background:#1e3a8a" onclick="setMakeup('liner','#1e3a8a',this)"></div>
          <div class="swatch" style="background:#7e22ce" onclick="setMakeup('liner','#7e22ce',this)"></div>
          <div class="swatch" style="background:#166534" onclick="setMakeup('liner','#166534',this)"></div>
          <div class="swatch" style="background:#881337" onclick="setMakeup('liner','#881337',this)"></div>
          <div class="swatch" style="background:#c2410c" onclick="setMakeup('liner','#c2410c',this)"></div>
        </div>
      </div>

      <div class="section">
        <h3>🔆 Mascara</h3>
        <div class="toggle-row">
          <button class="toggle-btn active" id="mascara-off" onclick="setMascara(false)">Off</button>
          <button class="toggle-btn" id="mascara-on" onclick="setMascara(true)">Glam On ✨</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="section">
        <h3>💋 Lipstick</h3>
        <div class="colour-row" id="lip-swatches">
          <div class="swatch none-swatch" onclick="setMakeup('lips','none',this)">✕</div>
          <div class="swatch active" style="background:#e8667a" onclick="setMakeup('lips','#e8667a',this)"></div>
          <div class="swatch" style="background:#dc2626" onclick="setMakeup('lips','#dc2626',this)"></div>
          <div class="swatch" style="background:#db2777" onclick="setMakeup('lips','#db2777',this)"></div>
          <div class="swatch" style="background:#9333ea" onclick="setMakeup('lips','#9333ea',this)"></div>
          <div class="swatch" style="background:#f97316" onclick="setMakeup('lips','#f97316',this)"></div>
          <div class="swatch" style="background:#fda4af" onclick="setMakeup('lips','#fda4af',this)"></div>
          <div class="swatch" style="background:#fde68a" onclick="setMakeup('lips','#fde68a',this)"></div>
          <div class="swatch" style="background:#854d0e" onclick="setMakeup('lips','#854d0e',this)"></div>
        </div>
      </div>

      <div class="section">
        <h3>🌸 Blush</h3>
        <div class="colour-row" id="blush-swatches">
          <div class="swatch none-swatch" onclick="setMakeup('blush','none',this)">✕</div>
          <div class="swatch" style="background:#fda4af" onclick="setMakeup('blush','#fda4af',this)"></div>
          <div class="swatch" style="background:#f9a8d4" onclick="setMakeup('blush','#f9a8d4',this)"></div>
          <div class="swatch" style="background:#fdba74" onclick="setMakeup('blush','#fdba74',this)"></div>
          <div class="swatch" style="background:#fef08a" onclick="setMakeup('blush','#fef08a',this)"></div>
          <div class="swatch" style="background:#c4b5fd" onclick="setMakeup('blush','#c4b5fd',this)"></div>
        </div>
      </div>

      <div class="section">
        <h3>✨ Highlighter</h3>
        <div class="toggle-row">
          <button class="toggle-btn active" id="hi-off" onclick="setHighlighter(false)">Off</button>
          <button class="toggle-btn" id="hi-on" onclick="setHighlighter(true)">Glow ✨</button>
        </div>
      </div>

      <div class="section">
        <h3>💎 Glitter</h3>
        <div class="toggle-row">
          <button class="toggle-btn active" id="gl-off" onclick="setGlitter(false)">Off</button>
          <button class="toggle-btn" id="gl-on" onclick="setGlitter(true)">Sparkle 💎</button>
        </div>
      </div>

      <button class="reset-btn" onclick="resetAll()">🔄 Start Over</button>
    </div>

  </div>
</div>

<script>
const svg = document.getElementById('char-svg');

function setMakeup(type, colour, swatch) {
  // Deactivate siblings
  swatch.parentElement.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  swatch.classList.add('active');

  const none = colour === 'none';

  if (type === 'eyeshadow') {
    ['es-l','es-r'].forEach(id => {
      svg.getElementById(id).setAttribute('fill', none ? 'transparent' : colour);
    });
  }

  if (type === 'liner') {
    ['liner-l','liner-r'].forEach(id => {
      svg.getElementById(id).setAttribute('stroke', none ? 'transparent' : colour);
    });
  }

  if (type === 'lips') {
    const darken = none ? '#e8667a' : shadeColour(colour, -20);
    svg.getElementById('lip-upper').setAttribute('fill', none ? '#e8667a' : colour);
    svg.getElementById('lip-lower').setAttribute('fill', none ? '#e86080' : darken);
  }

  if (type === 'blush') {
    ['blush-l','blush-r'].forEach(id => {
      const el = svg.getElementById(id);
      el.setAttribute('fill', none ? '#ffb3c6' : colour);
      el.setAttribute('opacity', none ? '0' : '0.55');
    });
  }
}

function setMascara(on) {
  svg.getElementById('mascara-lashes').setAttribute('opacity', on ? '1' : '0');
  document.getElementById('mascara-on').classList.toggle('active', on);
  document.getElementById('mascara-off').classList.toggle('active', !on);
}

function setHighlighter(on) {
  ['hi-l','hi-r'].forEach(id => svg.getElementById(id).setAttribute('opacity', on ? '0.75' : '0'));
  document.getElementById('hi-on').classList.toggle('active', on);
  document.getElementById('hi-off').classList.toggle('active', !on);
}

function setGlitter(on) {
  const g = svg.getElementById('glitter-group');
  g.setAttribute('opacity', on ? '1' : '0');
  if (on && g.children.length === 0) buildGlitter();
  document.getElementById('gl-on').classList.toggle('active', on);
  document.getElementById('gl-off').classList.toggle('active', !on);
}

function buildGlitter() {
  const g = svg.getElementById('glitter-group');
  const colours = ['#ff80ff','#ffdd00','#80ffff','#ff80aa','#ffffff','#cc80ff'];
  const spots = [
    [90,145],[105,138],[76,148],[150,145],[165,138],[136,148],
    [120,188],[108,192],[132,192],[86,172],[154,172],
    [70,185],[170,185],[120,215],[105,212],[135,212]
  ];
  spots.forEach(([x,y]) => {
    const ns = 'http://www.w3.org/2000/svg';
    const t = document.createElementNS(ns,'text');
    t.setAttribute('x', x + (Math.random()*8-4));
    t.setAttribute('y', y + (Math.random()*6-3));
    t.setAttribute('font-size', 8 + Math.random()*8);
    t.setAttribute('text-anchor','middle');
    t.textContent = '✨';
    g.appendChild(t);
  });
}

function shadeColour(hex, pct) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, Math.max(0, (n>>16) + pct));
  const g = Math.min(255, Math.max(0, ((n>>8)&0xff) + pct));
  const b = Math.min(255, Math.max(0, (n&0xff) + pct));
  return '#' + [r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function resetAll() {
  // Eyeshadow
  ['es-l','es-r'].forEach(id => svg.getElementById(id).setAttribute('fill','transparent'));
  // Liner
  ['liner-l','liner-r'].forEach(id => svg.getElementById(id).setAttribute('stroke','transparent'));
  // Lips
  svg.getElementById('lip-upper').setAttribute('fill','#e8667a');
  svg.getElementById('lip-lower').setAttribute('fill','#e86080');
  // Blush
  ['blush-l','blush-r'].forEach(id => { svg.getElementById(id).setAttribute('fill','#ffb3c6'); svg.getElementById(id).setAttribute('opacity','0'); });
  // Highlighter
  ['hi-l','hi-r'].forEach(id => svg.getElementById(id).setAttribute('opacity','0'));
  // Mascara
  setMascara(false);
  // Highlighter
  setHighlighter(false);
  // Glitter
  svg.getElementById('glitter-group').setAttribute('opacity','0');
  document.getElementById('gl-on').classList.remove('active');
  document.getElementById('gl-off').classList.add('active');

  // Reset swatch active states
  document.querySelectorAll('.colour-row').forEach(row => {
    row.querySelectorAll('.swatch').forEach((s,i) => s.classList.toggle('active', i===0));
  });
  // Reset lip swatch to default pink
  const lipRow = document.getElementById('lip-swatches');
  lipRow.querySelectorAll('.swatch').forEach((s,i) => s.classList.toggle('active', i===1));
}
</script>
</body>
</html>
