<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Makeover Studio 💄</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffe0f0 0%, #ffc8e8 50%, #ffb3d9 100%);
      font-family: 'Nunito', sans-serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 10px 30px;
    }
    header { text-align: center; padding: 8px 0 6px; }
    h1 { font-family: 'Fredoka One', cursive; font-size: clamp(1.5rem,5vw,2.4rem); color: #c0306a; text-shadow: 2px 2px 0 rgba(255,255,255,0.6); }
    #back { position:fixed;top:12px;left:14px;text-decoration:none;color:#c0306a;font-size:1.4rem;font-weight:700;z-index:20;background:rgba(255,255,255,0.6);border-radius:50px;padding:4px 12px; }

    /* Step bar */
    .steps {
      display: flex; align-items: center; gap: 6px;
      background: white; border-radius: 50px; padding: 8px 16px;
      box-shadow: 0 4px 14px rgba(200,0,100,0.12); margin-bottom: 12px;
    }
    .step {
      font-family: 'Fredoka One', cursive; font-size: 0.88rem;
      color: #d0a0b8; transition: color 0.3s;
      display: flex; align-items: center; gap: 4px;
    }
    .step.active   { color: #c0306a; }
    .step.done     { color: #4caf50; }
    .step-arrow    { color: #d0a0b8; font-size: 0.8rem; }

    /* Main layout */
    .studio { display:flex;gap:14px;width:100%;max-width:820px;align-items:flex-start;justify-content:center;flex-wrap:wrap; }

    #char-wrap {
      background: white; border-radius: 24px;
      box-shadow: 0 6px 20px rgba(200,0,100,0.15);
      padding: 16px; flex: 0 0 auto;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      position: relative;
    }
    #char-svg { width: 230px; height: 340px; overflow: visible; }
    #char-svg.tool-active { cursor: none; }

    /* Cursor emoji that follows mouse */
    #tool-cursor {
      position: fixed; pointer-events: none; z-index: 999;
      font-size: 2rem; transform: translate(-8px, -8px);
      display: none;
    }

    #status-msg {
      font-family: 'Fredoka One', cursive; font-size: 0.92rem;
      color: #c0306a; text-align: center; min-height: 1.5em;
      background: #fff0f6; border-radius: 12px; padding: 4px 14px; width: 100%;
    }

    /* Progress bar */
    #progress-wrap { width: 100%; display: none; }
    #progress-bar-bg { width:100%;height:14px;background:#ffd0e8;border-radius:50px;overflow:hidden; }
    #progress-bar    { height:100%;background:linear-gradient(90deg,#ff80b0,#cc0066);border-radius:50px;width:0%;transition:width 0.3s; }
    #progress-label  { text-align:center;font-size:0.8rem;color:#c0306a;font-weight:700;margin-top:3px; }

    /* Right panel */
    .panel {
      background: white; border-radius: 20px; padding: 16px;
      box-shadow: 0 6px 20px rgba(200,0,100,0.12);
      flex: 1 1 200px; min-width: 180px; max-width: 270px;
    }
    .panel h3 { font-family:'Fredoka One',cursive; color:#c0306a; font-size:1.05rem; margin-bottom:10px; text-align:center; }

    .tool-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px; }
    .tool-btn {
      border: 2.5px solid #f0b0c8; border-radius: 14px; background: #fff5f8;
      padding: 10px 4px 6px; cursor: pointer; text-align: center;
      transition: all 0.15s; display:flex;flex-direction:column;align-items:center;gap:3px;
    }
    .tool-btn .ti { font-size: 1.8rem; }
    .tool-btn .tn { font-size: 0.72rem; font-weight:700; color:#c0306a; }
    .tool-btn:hover  { border-color:#e06090;background:#ffe8f0;transform:translateY(-2px); }
    .tool-btn.active { border-color:#c0306a;background:linear-gradient(135deg,#ffd0e8,#ffaac8);box-shadow:0 3px 10px rgba(192,48,106,0.3);transform:translateY(-2px); }

    .eraser-btn { width:100%;padding:8px;border-radius:10px;border:2px dashed #e0b0c8;background:#fff8fb;color:#c0306a;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;margin-bottom:10px; }
    .eraser-btn:hover { background:#ffe0ee; }
    .eraser-btn.active { background:#ffd0e8;border-color:#c0306a; }

    .colour-row { display:flex;flex-wrap:wrap;gap:7px; }
    .swatch { width:30px;height:30px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform 0.15s,border-color 0.15s;box-shadow:0 2px 5px rgba(0,0,0,0.18);flex-shrink:0; }
    .swatch:hover  { transform:scale(1.2); }
    .swatch.active { border-color:#440033;transform:scale(1.1); }

    .reset-btn { margin-top:12px;width:100%;padding:10px;border-radius:50px;border:none;background:linear-gradient(135deg,#ff80b0,#cc0055);color:white;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;box-shadow:0 3px 0 #880033; }

    /* Zone circles on face */
    .zone { fill:transparent;stroke:rgba(255,100,160,0.35);stroke-width:2.5;stroke-dasharray:6 4;cursor:default;pointer-events:none;transition:stroke 0.2s; }
    .zone.active { pointer-events:all;cursor:crosshair;stroke:rgba(255,40,120,0.9);animation:zpulse 1.2s ease-in-out infinite; }
    .zone.active:hover { fill:rgba(255,150,200,0.2);stroke:rgba(255,0,100,1); }
    @keyframes zpulse { 0%,100%{stroke-opacity:.9} 50%{stroke-opacity:.25} }

    /* Sparkle pop */
    .sparkle-pop { position:absolute;font-size:2rem;pointer-events:none;animation:sflyup .65s ease-out forwards; }
    @keyframes sflyup { 0%{opacity:1;transform:translate(-50%,-50%) scale(.4)} 60%{opacity:1;transform:translate(-50%,-120%) scale(1.3)} 100%{opacity:0;transform:translate(-50%,-170%) scale(1)} }

    /* Dirty smudge scrub */
    .scrub-hint { font-size:0.78rem;color:#a08060;text-align:center;margin-top:4px; }
  </style>
</head>

<script>
// ── Phase state ──────────────────────────────────────
let phase = 'wash'; // wash | brush | makeup
let dirtLeft = 6;
let brushCells = new Set();
const BRUSH_NEEDED = 14;

// ── Sponge/brush cursor ──────────────────────────────
const cursor = document.getElementById('tool-cursor');
const charSvg = document.getElementById('char-svg');

document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

function showCursor(emoji) {
  cursor.textContent = emoji;
  cursor.style.display = 'block';
  charSvg.classList.add('tool-active');
}
function hideCursor() {
  cursor.style.display = 'none';
  charSvg.classList.remove('tool-active');
}

// ── SVG coords ───────────────────────────────────────
function svgPt(e) {
  const rect = charSvg.getBoundingClientRect();
  const src  = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * 230 / rect.width,
    y: (src.clientY - rect.top)  * 330 / rect.height
  };
}

function overFace(pt) {
  const dx = (pt.x - 115) / 80, dy = (pt.y - 168) / 90;
  return dx*dx + dy*dy < 1;
}

// ── PHASE 1: WASH ─────────────────────────────────────
function startWashPhase() {
  setStep(1);
  showCursor('🧽');
  showProgress();
  updateProgress(6 - dirtLeft, 6);
  renderPanel('wash');

  charSvg.addEventListener('mousemove', onWashMove);
  charSvg.addEventListener('touchmove', onWashTouch, { passive: true });
}

function onWashMove(e) {
  if (phase !== 'wash') return;
  const pt = svgPt(e);
  if (overFace(pt)) checkDirt(pt);
}
function onWashTouch(e) {
  if (phase !== 'wash') return;
  const pt = svgPt(e);
  checkDirt(pt);
}

function checkDirt(pt) {
  document.querySelectorAll('#dirt-group ellipse').forEach(el => {
    if (el.style.display === 'none') return;
    const cx = parseFloat(el.getAttribute('cx'));
    const cy = parseFloat(el.getAttribute('cy'));
    if (Math.hypot(pt.x - cx, pt.y - cy) < 32) {
      el.style.display = 'none';
      dirtLeft--;
      sparkle(cx, cy);
      updateProgress(6 - dirtLeft, 6);
      if (dirtLeft === 0) {
        setTimeout(() => {
          charSvg.removeEventListener('mousemove', onWashMove);
          charSvg.removeEventListener('touchmove', onWashTouch);
          startBrushPhase();
        }, 600);
      }
    }
  });
}

// ── PHASE 2: BRUSH ────────────────────────────────────
function startBrushPhase() {
  phase = 'brush';
  setStep(2);
  showCursor('🪮');
  brushCells.clear();
  updateProgress(0, BRUSH_NEEDED);
  document.getElementById('status-msg').textContent = '🪮 Brush through the hair to smooth it!';
  renderPanel('brush');

  charSvg.addEventListener('mousemove', onBrushMove);
  charSvg.addEventListener('touchmove', onBrushTouch, { passive: true });
}

function onBrushMove(e) {
  if (phase !== 'brush') return;
  checkBrush(svgPt(e));
}
function onBrushTouch(e) {
  if (phase !== 'brush') return;
  checkBrush(svgPt(e));
}

function checkBrush(pt) {
  // Hair zone: top of head, approx y < 160 or sides
  if (pt.y > 180 && pt.x > 40 && pt.x < 190) return;
  if (pt.y < 20 || pt.y > 220) return;
  const cell = Math.floor(pt.x / 30) + '_' + Math.floor(pt.y / 30);
  if (!brushCells.has(cell)) {
    brushCells.add(cell);
    updateProgress(brushCells.size, BRUSH_NEEDED);
    if (brushCells.size >= BRUSH_NEEDED) {
      // Fade out messy hair
      document.getElementById('hair-mess').style.opacity = '0';
      document.getElementById('hair-mess').style.transition = 'opacity 0.6s';
      setTimeout(() => {
        document.getElementById('hair-mess').style.display = 'none';
        charSvg.removeEventListener('mousemove', onBrushMove);
        charSvg.removeEventListener('touchmove', onBrushTouch);
        startMakeupPhase();
      }, 700);
    }
  }
}

// ── PHASE 3: MAKEUP ───────────────────────────────────
let activeTool = null, activeColour = '#c084fc';

const TOOLS = {
  eyeshadow:   { label:'Eyeshadow 🖌️', zones:['eye-l','eye-r'],   emoji:'🖌️', colours:['#c084fc','#818cf8','#38bdf8','#34d399','#fb923c','#f472b6','#fbbf24','#a8a29e'] },
  liner:       { label:'Eyeliner ✏️',   zones:['eye-l','eye-r'],   emoji:'✏️', colours:['#111','#1e3a8a','#7e22ce','#166534','#881337','#c2410c'] },
  mascara:     { label:'Mascara 🪄',    zones:['eye-l','eye-r'],   emoji:'🪄', colours:[] },
  blush:       { label:'Blush 🌸',      zones:['cheek-l','cheek-r'],emoji:'🌸', colours:['#fda4af','#f9a8d4','#fdba74','#fef08a','#c4b5fd'] },
  lipstick:    { label:'Lipstick 💄',   zones:['lips'],             emoji:'💄', colours:['#e8405a','#dc2626','#db2777','#9333ea','#f97316','#fda4af','#fde68a','#854d0e'] },
  highlighter: { label:'Highlight ✨',  zones:['cheek-l','cheek-r'],emoji:'✨', colours:['#fffce0','#fef9c3','#fde68a','#ffc0cb'] },
};

const ZONE_POS = { 'eye-l':[84,151],'eye-r':[146,151],'cheek-l':[50,186],'cheek-r':[180,186],'lips':[115,222] };
const ALL_ZONES = Object.keys(ZONE_POS);

function startMakeupPhase() {
  phase = 'makeup';
  setStep(3);
  hideCursor();
  hideProgress();
  document.getElementById('status-msg').textContent = '👆 Pick a tool to start your makeover!';
  document.getElementById('scrub-hint').style.display = 'none';
  renderPanel('makeup');
}

function selectTool(name, btn) {
  if (activeTool === name) {
    activeTool = null;
    document.querySelectorAll('.tool-btn,.eraser-btn').forEach(b => b.classList.remove('active'));
    setZones([]);
    document.getElementById('status-msg').textContent = '👆 Pick a tool!';
    hideCursor();
    renderColours([]);
    return;
  }
  activeTool = name;
  document.querySelectorAll('.tool-btn,.eraser-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (name === 'eraser') {
    setZones(ALL_ZONES);
    showCursor('🧹');
    document.getElementById('status-msg').textContent = '🧹 Click a zone to remove makeup';
    renderColours([]);
    return;
  }

  const t = TOOLS[name];
  setZones(t.zones);
  showCursor(t.emoji);
  document.getElementById('status-msg').textContent = t.label + ' — click a glowing zone!';
  renderColours(t.colours);
  if (t.colours.length) activeColour = t.colours[0];
}

function setZones(active) {
  ALL_ZONES.forEach(id => {
    const z = document.getElementById('zone-' + id);
    if (active.includes(id)) {
      z.classList.add('active');
      z.onclick = () => applyZone(id);
    } else {
      z.classList.remove('active');
      z.onclick = null;
    }
  });
}

function applyZone(zone) {
  if (activeTool === 'eraser') { eraseZone(zone); sparkleAt(zone); return; }
  switch(activeTool) {
    case 'eyeshadow':
      document.getElementById(zone === 'eye-l' ? 'es-l' : 'es-r').setAttribute('fill', activeColour);
      break;
    case 'liner':
      document.getElementById(zone === 'eye-l' ? 'liner-l' : 'liner-r').setAttribute('stroke', activeColour);
      break;
    case 'mascara':
      document.getElementById('glam-lashes').setAttribute('opacity','1');
      break;
    case 'blush':
      document.getElementById(zone === 'cheek-l' ? 'blush-l' : 'blush-r').setAttribute('opacity','0.6');
      document.getElementById(zone === 'cheek-l' ? 'blush-l' : 'blush-r').setAttribute('fill', activeColour);
      break;
    case 'lipstick':
      document.getElementById('lip-upper').setAttribute('fill', activeColour);
      document.getElementById('lip-lower').setAttribute('fill', darken(activeColour, 28));
      break;
    case 'highlighter':
      document.getElementById(zone === 'cheek-l' ? 'hi-l' : 'hi-r').setAttribute('opacity','0.9');
      break;
  }
  sparkleAt(zone);
}

function eraseZone(zone) {
  if (zone === 'eye-l') {
    document.getElementById('es-l').setAttribute('fill','transparent');
    document.getElementById('liner-l').setAttribute('stroke','transparent');
    document.getElementById('glam-lashes').setAttribute('opacity','0');
  }
  if (zone === 'eye-r') {
    document.getElementById('es-r').setAttribute('fill','transparent');
    document.getElementById('liner-r').setAttribute('stroke','transparent');
    document.getElementById('glam-lashes').setAttribute('opacity','0');
  }
  if (zone.startsWith('cheek')) {
    const side = zone === 'cheek-l' ? 'l' : 'r';
    document.getElementById('blush-' + side).setAttribute('opacity','0');
    document.getElementById('hi-' + side).setAttribute('opacity','0');
  }
  if (zone === 'lips') {
    document.getElementById('lip-upper').setAttribute('fill','#e8405a');
    document.getElementById('lip-lower').setAttribute('fill','#c42840');
  }
}

// ── Sparkle ───────────────────────────────────────────
function sparkle(svgX, svgY) {
  const wrap = document.getElementById('char-wrap');
  const svgEl = charSvg;
  const r  = svgEl.getBoundingClientRect();
  const wr = wrap.getBoundingClientRect();
  const px = r.left - wr.left + (svgX / 230) * r.width;
  const py = r.top  - wr.top  + (svgY / 330) * r.height;
  const s  = document.createElement('div');
  s.className = 'sparkle-pop';
  s.textContent = ['✨','💫','⭐','🌟'][Math.floor(Math.random()*4)];
  s.style.left = px + 'px'; s.style.top = py + 'px';
  wrap.appendChild(s);
  setTimeout(() => s.remove(), 700);
}
function sparkleAt(zone) {
  const [x,y] = ZONE_POS[zone];
  sparkle(x, y);
}

// ── Helpers ───────────────────────────────────────────
function darken(hex, amt) {
  const n = parseInt(hex.replace('#',''),16);
  const r = Math.max(0,(n>>16)-amt), g = Math.max(0,((n>>8)&0xff)-amt), b = Math.max(0,(n&0xff)-amt);
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function setStep(n) {
  ['s1','s2','s3'].forEach((id,i) => {
    const el = document.getElementById(id);
    el.className = 'step' + (i+1 < n ? ' done' : i+1 === n ? ' active' : '');
  });
}

function showProgress() {
  document.getElementById('progress-wrap').style.display = 'block';
}
function hideProgress() {
  document.getElementById('progress-wrap').style.display = 'none';
}
function updateProgress(val, max) {
  const pct = Math.min(100, Math.round(val / max * 100));
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = pct + '%';
  if (val >= max) {
    document.getElementById('status-msg').textContent = '🎉 Amazing! Moving on...';
  }
}

// ── Panel rendering ───────────────────────────────────
function renderPanel(p) {
  const panel = document.getElementById('right-panel');
  if (p === 'wash') {
    panel.innerHTML = `
      <h3>🧼 Wash Time!</h3>
      <p style="color:#888;font-size:0.9rem;text-align:center;line-height:1.5">
        Move your mouse (or finger) all over the face to scrub away the dirt!
      </p>
      <div style="text-align:center;font-size:3rem;margin:20px 0">🧽💧</div>
      <p style="color:#c0306a;font-size:0.85rem;text-align:center;font-weight:700">${dirtLeft} dirt spots left</p>
    `;
  } else if (p === 'brush') {
    panel.innerHTML = `
      <h3>🪮 Brush Time!</h3>
      <p style="color:#888;font-size:0.9rem;text-align:center;line-height:1.5">
        Move the brush through all of her hair to smooth out the tangles!
      </p>
      <div style="text-align:center;font-size:3rem;margin:20px 0">🪮💆‍♀️</div>
    `;
  } else {
    panel.innerHTML = `
      <h3>🧴 Pick a Tool</h3>
      <div class="tool-grid">
        ${Object.entries(TOOLS).map(([id,t]) => `
          <button class="tool-btn" onclick="selectTool('${id}',this)">
            <span class="ti">${t.emoji}</span>
            <span class="tn">${t.label.split(' ')[0]}</span>
          </button>
        `).join('')}
      </div>
      <button class="eraser-btn" onclick="selectTool('eraser',this)">🧹 Eraser</button>
      <div id="colour-section">
        <h3 id="colour-title" style="font-family:'Fredoka One',cursive;color:#c0306a;font-size:1rem;margin-bottom:8px;text-align:center">🎨 Colour</h3>
        <div class="colour-row" id="colour-row"></div>
      </div>
      <button class="reset-btn" onclick="resetMakeup()">🔄 Start Over</button>
    `;
  }
}

function renderColours(colours) {
  const row = document.getElementById('colour-row');
  if (!row) return;
  row.innerHTML = '';
  colours.forEach((c,i) => {
    const s = document.createElement('div');
    s.className = 'swatch' + (i===0?' active':'');
    s.style.background = c;
    if (c==='#111') s.style.border='3px solid #666';
    s.onclick = () => {
      activeColour = c;
      row.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));
      s.classList.add('active');
    };
    row.appendChild(s);
  });
  if (colours.length) activeColour = colours[0];
}

function resetMakeup() {
  ['es-l','es-r'].forEach(id => document.getElementById(id).setAttribute('fill','transparent'));
  ['liner-l','liner-r'].forEach(id => document.getElementById(id).setAttribute('stroke','transparent'));
  document.getElementById('glam-lashes').setAttribute('opacity','0');
  ['blush-l','blush-r'].forEach(id => document.getElementById(id).setAttribute('opacity','0'));
  ['hi-l','hi-r'].forEach(id => document.getElementById(id).setAttribute('opacity','0'));
  document.getElementById('lip-upper').setAttribute('fill','#e8405a');
  document.getElementById('lip-lower').setAttribute('fill','#c42840');
  activeTool = null;
  document.querySelectorAll('.tool-btn,.eraser-btn').forEach(b=>b.classList.remove('active'));
  setZones([]);
  hideCursor();
  document.getElementById('status-msg').textContent = '👆 Pick a tool to start your makeover!';
  renderColours([]);
}

// ── Init ──────────────────────────────────────────────
showProgress();
renderPanel('wash');
startWashPhase();
</script>
</body>
</html>
