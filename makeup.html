<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Makeup Studio 💄</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffe0f0 0%, #ffd0e8 50%, #ffb3d9 100%);
      font-family: 'Nunito', sans-serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 10px 30px;
    }

    header { text-align: center; padding: 10px 0 6px; }
    h1 { font-family: 'Fredoka One', cursive; font-size: clamp(1.6rem,6vw,2.6rem); color: #c0306a; text-shadow: 2px 2px 0 rgba(255,255,255,0.6); }

    #back {
      position: fixed; top: 12px; left: 14px;
      text-decoration: none; color: #c0306a; font-size: 1.4rem; font-weight: 700; z-index: 20;
      background: rgba(255,255,255,0.6); border-radius: 50px; padding: 4px 12px;
    }

    .studio {
      display: flex; gap: 16px; width: 100%; max-width: 820px;
      align-items: flex-start; justify-content: center; flex-wrap: wrap;
    }

    /* ── Face card ── */
    #char-wrap {
      background: white; border-radius: 24px;
      box-shadow: 0 6px 20px rgba(200,0,100,0.15);
      padding: 16px; flex: 0 0 auto;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      position: relative;
    }

    #char-svg { width: 220px; height: 320px; overflow: visible; }

    /* Zone circles glow when tool is active */
    .zone {
      fill: transparent;
      stroke: rgba(255,150,200,0.4);
      stroke-width: 2.5;
      stroke-dasharray: 6 4;
      cursor: default;
      transition: stroke 0.2s;
      pointer-events: none;
    }
    .zone.active {
      pointer-events: all;
      cursor: crosshair;
      stroke: rgba(255,60,150,0.85);
      stroke-dasharray: 6 4;
      animation: zonePulse 1.2s ease-in-out infinite;
    }
    .zone.active:hover {
      fill: rgba(255,150,200,0.18);
      stroke: rgba(255,20,120,1);
    }
    @keyframes zonePulse {
      0%,100% { stroke-opacity: 0.85; }
      50%      { stroke-opacity: 0.3;  }
    }

    /* Sparkle animation on zone */
    .sparkle-pop {
      position: absolute; font-size: 1.8rem; pointer-events: none;
      animation: sparkleFly 0.65s ease-out forwards;
    }
    @keyframes sparkleFly {
      0%   { opacity: 1; transform: translate(-50%,-50%) scale(0.4); }
      60%  { opacity: 1; transform: translate(-50%,-110%) scale(1.3); }
      100% { opacity: 0; transform: translate(-50%,-160%) scale(1);   }
    }

    /* ── Status bar ── */
    #status {
      font-family: 'Fredoka One', cursive; font-size: 0.95rem;
      color: #c0306a; text-align: center; min-height: 1.6em;
      background: #fff0f6; border-radius: 12px; padding: 4px 14px;
    }

    /* ── Right panel ── */
    .panel {
      background: white; border-radius: 20px; padding: 16px;
      box-shadow: 0 6px 20px rgba(200,0,100,0.12);
      flex: 1 1 200px; min-width: 200px; max-width: 270px;
    }
    .panel h3 { font-family: 'Fredoka One', cursive; color: #c0306a; font-size: 1.05rem; margin-bottom: 10px; text-align: center; }

    /* Tool grid */
    .tool-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px; }

    .tool-btn {
      border: 2.5px solid #f0b0c8; border-radius: 14px; background: #fff5f8;
      padding: 10px 4px 6px; cursor: pointer; text-align: center;
      transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .tool-btn .tool-icon { font-size: 1.8rem; display: block; }
    .tool-btn .tool-name { font-size: 0.72rem; font-weight: 700; color: #c0306a; }
    .tool-btn:hover  { border-color: #e06090; background: #ffe8f0; transform: translateY(-2px); }
    .tool-btn.active { border-color: #c0306a; background: linear-gradient(135deg,#ffd0e8,#ffaac8); box-shadow: 0 3px 10px rgba(192,48,106,0.3); transform: translateY(-2px); }

    /* Eraser */
    .eraser-btn {
      width: 100%; padding: 8px; border-radius: 10px;
      border: 2px dashed #e0b0c8; background: #fff8fb;
      color: #c0306a; font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 700;
      cursor: pointer; transition: all 0.15s; margin-bottom: 10px;
    }
    .eraser-btn:hover  { background: #ffe0ee; }
    .eraser-btn.active { background: #ffd0e8; border-color: #c0306a; }

    /* Colour swatches */
    #colour-section h3 { margin-top: 0; }
    .colour-row { display: flex; flex-wrap: wrap; gap: 7px; }
    .swatch {
      width: 30px; height: 30px; border-radius: 50%;
      border: 3px solid transparent; cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.18); flex-shrink: 0;
    }
    .swatch:hover  { transform: scale(1.2); }
    .swatch.active { border-color: #440033; transform: scale(1.1); }

    .reset-btn {
      margin-top: 14px; width: 100%; padding: 10px; border-radius: 50px; border: none;
      background: linear-gradient(135deg,#ff80b0,#cc0055); color: white;
      font-family: 'Fredoka One', cursive; font-size: 1rem;
      cursor: pointer; box-shadow: 0 3px 0 #880033;
    }
    .reset-btn:active { transform: translateY(2px); }
  </style>
</head>
<body>

<a href="index.html" id="back">← Back</a>

<script>
// ── Tool definitions ──────────────────────────────────────
const TOOLS = {
  eyeshadow:   { label:'Eyeshadow 🖌️',  zones:['eye-l','eye-r'],           colours:['#c084fc','#818cf8','#38bdf8','#34d399','#fb923c','#f472b6','#fbbf24','#a8a29e'] },
  liner:       { label:'Eyeliner ✏️',    zones:['eye-l','eye-r'],           colours:['#111111','#1e3a8a','#7e22ce','#166534','#881337','#c2410c','#ffffff'] },
  mascara:     { label:'Mascara 🪄',     zones:['eye-l','eye-r'],           colours:[] },
  blush:       { label:'Blush 🌸',       zones:['cheek-l','cheek-r'],       colours:['#fda4af','#f9a8d4','#fdba74','#fef08a','#c4b5fd','#86efac'] },
  lipstick:    { label:'Lipstick 💄',    zones:['lips'],                    colours:['#e8667a','#dc2626','#db2777','#9333ea','#f97316','#fda4af','#fde68a','#854d0e'] },
  highlighter: { label:'Highlighter ✨', zones:['cheek-l','cheek-r'],       colours:['#fffce0','#fef9c3','#fde68a','#ffc0cb','#e0f2fe'] },
};

let activeTool  = null;
let activeColour = '#c084fc';

// ── Select tool ───────────────────────────────────────────
function selectTool(name, btn) {
  // Toggle off if already selected
  if (activeTool === name) {
    activeTool = null;
    document.querySelectorAll('.tool-btn,.eraser-btn').forEach(b => b.classList.remove('active'));
    updateZones([]);
    setStatus('👆 Pick a tool to start!');
    document.getElementById('colour-section').style.display = '';
    document.getElementById('colour-row').innerHTML = '';
    document.getElementById('colour-title').textContent = '🎨 Colour';
    return;
  }

  activeTool = name;
  document.querySelectorAll('.tool-btn,.eraser-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (name === 'eraser') {
    updateZones(['eye-l','eye-r','cheek-l','cheek-r','lips']);
    setStatus('🧹 Click a zone to remove its makeup');
    document.getElementById('colour-row').innerHTML = '';
    document.getElementById('colour-title').textContent = '';
    return;
  }

  const tool = TOOLS[name];
  updateZones(tool.zones);

  if (name === 'mascara') {
    setStatus('🪄 Click an eye to add glamour lashes!');
    document.getElementById('colour-row').innerHTML = '';
    document.getElementById('colour-title').textContent = '';
  } else {
    setStatus(`${tool.label} — click a glowing zone!`);
    buildColours(tool.colours);
    document.getElementById('colour-title').textContent = '🎨 Colour';
  }
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ── Zone management ───────────────────────────────────────
const ALL_ZONES = ['eye-l','eye-r','cheek-l','cheek-r','lips'];

function updateZones(activeZones) {
  ALL_ZONES.forEach(id => {
    const z = document.getElementById('zone-' + id);
    if (activeZones.includes(id)) {
      z.classList.add('active');
      z.onclick = () => applyToZone(id);
    } else {
      z.classList.remove('active');
      z.onclick = null;
    }
  });
}

// ── Colour picker ─────────────────────────────────────────
function buildColours(colours) {
  const row = document.getElementById('colour-row');
  row.innerHTML = '';
  colours.forEach((c, i) => {
    const s = document.createElement('div');
    s.className = 'swatch' + (i === 0 ? ' active' : '');
    s.style.background = c;
    if (c === '#ffffff') s.style.border = '3px solid #ddd';
    s.onclick = () => {
      activeColour = c;
      row.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
    };
    row.appendChild(s);
  });
  if (colours.length) activeColour = colours[0];
}

// ── Apply makeup ──────────────────────────────────────────
function applyToZone(zone) {
  const svg = document.getElementById('char-svg');

  if (activeTool === 'eraser') {
    eraseZone(zone);
    sparkle(zone);
    return;
  }

  switch(activeTool) {
    case 'eyeshadow':
      if (zone === 'eye-l' || zone === 'eye-r') {
        const id = zone === 'eye-l' ? 'es-l' : 'es-r';
        svg.getElementById(id).setAttribute('fill', activeColour);
      }
      break;

    case 'liner':
      if (zone === 'eye-l') svg.getElementById('liner-l').setAttribute('stroke', activeColour);
      if (zone === 'eye-r') svg.getElementById('liner-r').setAttribute('stroke', activeColour);
      break;

    case 'mascara':
      svg.getElementById('glam-lashes').setAttribute('opacity','1');
      break;

    case 'blush':
      if (zone === 'cheek-l') { svg.getElementById('blush-l').setAttribute('fill', activeColour); svg.getElementById('blush-l').setAttribute('opacity','0.6'); }
      if (zone === 'cheek-r') { svg.getElementById('blush-r').setAttribute('fill', activeColour); svg.getElementById('blush-r').setAttribute('opacity','0.6'); }
      break;

    case 'lipstick':
      svg.getElementById('lip-upper').setAttribute('fill', activeColour);
      svg.getElementById('lip-lower').setAttribute('fill', darken(activeColour, 25));
      break;

    case 'highlighter':
      if (zone === 'cheek-l') svg.getElementById('hi-l').setAttribute('opacity','0.9');
      if (zone === 'cheek-r') svg.getElementById('hi-r').setAttribute('opacity','0.9');
      break;
  }
  sparkle(zone);
}

function eraseZone(zone) {
  const svg = document.getElementById('char-svg');
  if (zone === 'eye-l') {
    svg.getElementById('es-l').setAttribute('fill','transparent');
    svg.getElementById('liner-l').setAttribute('stroke','transparent');
    svg.getElementById('glam-lashes').setAttribute('opacity','0');
  }
  if (zone === 'eye-r') {
    svg.getElementById('es-r').setAttribute('fill','transparent');
    svg.getElementById('liner-r').setAttribute('stroke','transparent');
    svg.getElementById('glam-lashes').setAttribute('opacity','0');
  }
  if (zone === 'cheek-l') { svg.getElementById('blush-l').setAttribute('opacity','0'); svg.getElementById('hi-l').setAttribute('opacity','0'); }
  if (zone === 'cheek-r') { svg.getElementById('blush-r').setAttribute('opacity','0'); svg.getElementById('hi-r').setAttribute('opacity','0'); }
  if (zone === 'lips') { svg.getElementById('lip-upper').setAttribute('fill','#e8667a'); svg.getElementById('lip-lower').setAttribute('fill','#d45068'); }
}

// ── Sparkle effect ────────────────────────────────────────
const ZONE_POS = { 'eye-l':[84,155], 'eye-r':[136,155], 'cheek-l':[56,190], 'cheek-r':[164,190], 'lips':[110,220] };

function sparkle(zone) {
  const [zx, zy] = ZONE_POS[zone];
  const wrap = document.getElementById('char-wrap');
  const svgEl = document.getElementById('char-svg');
  const rect  = svgEl.getBoundingClientRect();
  const wRect = wrap.getBoundingClientRect();
  const vb = [220, 320];
  const px = rect.left - wRect.left + (zx / vb[0]) * rect.width;
  const py = rect.top  - wRect.top  + (zy / vb[1]) * rect.height;
  const s = document.createElement('div');
  s.className = 'sparkle-pop';
  s.textContent = ['✨','💫','⭐','🌟'][Math.floor(Math.random()*4)];
  s.style.left = px + 'px';
  s.style.top  = py + 'px';
  wrap.appendChild(s);
  setTimeout(() => s.remove(), 700);
}

// ── Helpers ───────────────────────────────────────────────
function darken(hex, amt) {
  const n = parseInt(hex.replace('#',''),16);
  const r = Math.max(0,(n>>16)-amt);
  const g = Math.max(0,((n>>8)&0xff)-amt);
  const b = Math.max(0,(n&0xff)-amt);
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function resetAll() {
  const svg = document.getElementById('char-svg');
  svg.getElementById('es-l').setAttribute('fill','transparent');
  svg.getElementById('es-r').setAttribute('fill','transparent');
  svg.getElementById('liner-l').setAttribute('stroke','transparent');
  svg.getElementById('liner-r').setAttribute('stroke','transparent');
  svg.getElementById('glam-lashes').setAttribute('opacity','0');
  svg.getElementById('blush-l').setAttribute('opacity','0');
  svg.getElementById('blush-r').setAttribute('opacity','0');
  svg.getElementById('hi-l').setAttribute('opacity','0');
  svg.getElementById('hi-r').setAttribute('opacity','0');
  svg.getElementById('lip-upper').setAttribute('fill','#e8667a');
  svg.getElementById('lip-lower').setAttribute('fill','#d45068');
  activeTool = null;
  document.querySelectorAll('.tool-btn,.eraser-btn').forEach(b => b.classList.remove('active'));
  updateZones([]);
  document.getElementById('colour-row').innerHTML = '';
  document.getElementById('colour-title').textContent = '🎨 Colour';
  setStatus('👆 Pick a tool to start!');
}
</script>
