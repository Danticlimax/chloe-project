<!-- Shared face fragment — paste inside an SVG with viewBox="0 0 240 370" -->
<!-- Face design: realistic-cartoon hybrid -->

<defs>
  <radialGradient id="skinBase" cx="42%" cy="36%" r="65%">
    <stop offset="0%"   stop-color="#ffe8cc"/>
    <stop offset="60%"  stop-color="#f5c898"/>
    <stop offset="100%" stop-color="#e8a870"/>
  </radialGradient>
  <radialGradient id="irisL" cx="32%" cy="28%" r="72%">
    <stop offset="0%"   stop-color="#b8e0ff"/>
    <stop offset="40%"  stop-color="#4a90d0"/>
    <stop offset="100%" stop-color="#1a4888"/>
  </radialGradient>
  <radialGradient id="irisR" cx="32%" cy="28%" r="72%">
    <stop offset="0%"   stop-color="#b8e0ff"/>
    <stop offset="40%"  stop-color="#4a90d0"/>
    <stop offset="100%" stop-color="#1a4888"/>
  </radialGradient>
  <clipPath id="eyeL">
    <path d="M54,164 Q72,146 92,144 Q112,146 124,164 Q112,178 92,180 Q72,178 54,164Z"/>
  </clipPath>
  <clipPath id="eyeR">
    <path d="M116,164 Q134,146 154,144 Q174,146 186,164 Q174,178 154,180 Q134,178 116,164Z"/>
  </clipPath>
</defs>

<!-- NECK + SHOULDERS -->
<path d="M104,274 Q120,280 136,274 L134,320 Q120,326 106,320Z" fill="#f0be88"/>
<path d="M28,362 Q82,334 120,332 Q158,334 212,362 L240,370 L0,370Z" fill="#ff99cc"/>
<path d="M28,362 Q82,338 120,336 Q158,338 212,362" fill="none" stroke="#ff7fb0" stroke-width="5"/>

<!-- FACE -->
<ellipse cx="120" cy="183" rx="80" ry="95" fill="url(#skinBase)"/>

